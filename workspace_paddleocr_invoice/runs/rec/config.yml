Global:
  use_gpu: true
  epoch_num: 40
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /teamspace/studios/this_studio/workspace_paddleocr_invoice/runs/rec
  save_epoch_step: 1
  eval_batch_step:
  - 0
  - 312
  cal_metric_during_train: true
  pretrained_model: /teamspace/studios/this_studio/workspace_paddleocr_invoice/pretrain_models/rec_mv3_none_bilstm_ctc_v2.0_train/best_accuracy
  checkpoints: null
  save_inference_dir: null
  use_visualdl: false
  infer_img: doc/imgs_words_en/word_10.png
  character_dict_path: /teamspace/studios/this_studio/workspace_paddleocr_invoice/ppocr/utils/en_dict.txt
  max_text_length: 25
  infer_mode: false
  use_space_char: false
  save_res_path: ./output/rec/predicts_mv3_none_bilstm_ctc.txt
  use_amp: true
  amp_level: O2
  scale_loss: 1024.0
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.0005
  regularizer:
    name: L2
    factor: 0
Architecture:
  model_type: rec
  algorithm: CRNN
  Transform: null
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: large
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 96
  Head:
    name: CTCHead
    fc_decay: 0
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: acc
Train:
  dataset:
    name: SimpleDataSet
    data_dir: /
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 32
        - 100
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
    label_file_list:
    - /teamspace/studios/this_studio/workspace_paddleocr_invoice/prepared_data/train_rec.txt
  loader:
    shuffle: true
    batch_size_per_card: 256
    drop_last: true
    num_workers: 8
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 32
        - 100
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
    label_file_list:
    - /teamspace/studios/this_studio/workspace_paddleocr_invoice/prepared_data/val_rec.txt
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 256
    num_workers: 8
profiler_options: null
